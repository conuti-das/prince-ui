<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Abstrakte Token-Komposition">
  <defs>
    <linearGradient id="hgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bfe85a"/>
      <stop offset="1" stop-color="#6cae0f"/>
    </linearGradient>
    <linearGradient id="hgB" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#a0d22b" stop-opacity=".9"/>
      <stop offset="1" stop-color="#3f7a06" stop-opacity=".9"/>
    </linearGradient>
    <radialGradient id="hgGlow" cx="30%" cy="25%" r="80%">
      <stop offset="0" stop-color="#a0d22b" stop-opacity=".35"/>
      <stop offset="1" stop-color="#a0d22b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="360" fill="url(#hgGlow)"/>
  <!-- Karten-Stapel als Sinnbild für die Komponenten-Bibliothek -->
  <g transform="translate(96 70)">
    <rect x="0" y="48" width="288" height="180" rx="18" fill="#1e252b" opacity=".55"/>
    <rect x="18" y="24" width="288" height="180" rx="18" fill="#1e252b" opacity=".8"/>
    <rect x="36" y="0" width="288" height="180" rx="18" fill="#11161b"/>
    <rect x="36" y="0" width="288" height="180" rx="18" fill="none" stroke="#a0d22b" stroke-opacity=".4"/>
    <!-- Inhalt der oberen Karte -->
    <rect x="60" y="28" width="120" height="14" rx="7" fill="url(#hgA)"/>
    <rect x="60" y="56" width="200" height="9" rx="4.5" fill="#5b6770"/>
    <rect x="60" y="74" width="170" height="9" rx="4.5" fill="#3c454d"/>
    <rect x="60" y="116" width="96" height="36" rx="12" fill="url(#hgA)"/>
    <rect x="168" y="116" width="92" height="36" rx="12" fill="none" stroke="#5b6770"/>
    <circle cx="288" cy="40" r="10" fill="url(#hgB)"/>
  </g>
</svg>
