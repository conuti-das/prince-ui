name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: prince-ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first so workspace packages can resolve each other's dist types
      # (e.g. prince-ui-dmn imports `prince-ui`), then typecheck.
      - run: pnpm build
      - run: pnpm typecheck
      # Doku-Site bauen (löst Storybook als Build-Artefakt ab).
      - run: pnpm --filter @conuti-das/prince-ui-docs build